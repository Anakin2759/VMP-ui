name: CMake Multi-Platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 · clang-format 格式检查
  # ─────────────────────────────────────────────────────────────
  clang-format:
    name: ClangFormat Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq clang-format

      - name: Check formatting
        run: |
          find src example tests include \
            -type f \( -name '*.cpp' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  # ─────────────────────────────────────────────────────────────
  # Job 2 · Windows — MSVC / Clang-CL
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows · ${{ matrix.compiler }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: MSVC
            c_compiler: cl
            cxx_compiler: cl
          - compiler: Clang-CL
            c_compiler: clang-cl
            cxx_compiler: clang-cl
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -B build -S .
          -G Ninja
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_LTO=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

  # ─────────────────────────────────────────────────────────────
  # Job 3 · Windows — MinGW GCC (MSYS2 MINGW64)
  # ─────────────────────────────────────────────────────────────
  build-mingw:
    name: Windows · MinGW GCC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure CMake
        shell: msys2 {0}
        run: >
          cmake -B build -S .
          -G Ninja
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_LTO=OFF

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release --parallel

  # ─────────────────────────────────────────────────────────────
  # Job 4 · Linux — GCC / Clang
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux · ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC 15
            c_compiler: gcc-15
            cxx_compiler: g++-15
            install_gcc_15: true
          - compiler: Clang
            c_compiler: clang
            cxx_compiler: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq \
            software-properties-common \
            ninja-build \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxss-dev libwayland-dev libxkbcommon-dev \
            libegl1-mesa-dev libvulkan-dev

      - name: Install GCC 15
        if: matrix.install_gcc_15 == true
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -q
          sudo apt-get install -yq gcc-15 g++-15

      - name: Check GCC version
        if: matrix.install_gcc_15 == true
        run: |
          required=15.2
          version="$(${{ matrix.cxx_compiler }} -dumpfullversion -dumpversion)"
          echo "G++ version: ${version}"
          if [ "$(printf '%s\n' "${required}" "${version}" | sort -V | head -n1)" != "${required}" ]; then
            echo "G++ ${required} or newer is required."
            exit 1
          fi

      - name: Configure CMake
        run: >
          cmake -B build -S .
          -G Ninja
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_LTO=OFF

      - name: Build
        run: cmake --build build --config Release --parallel
